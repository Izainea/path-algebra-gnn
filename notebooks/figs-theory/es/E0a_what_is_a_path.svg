<svg xmlns="http://www.w3.org/2000/svg" width="820" height="380" viewBox="0 0 820 380" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/></marker>
    <marker id="gg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#cbd5e1"/></marker>
    <style>
      .t{font-size:21px;font-weight:700;fill:#0f172a}
      .s{font-size:13px;fill:#475569}
      .lbl{font-size:14px;font-weight:600;fill:#1e293b}
      .nd{font-size:13px;font-weight:700;fill:#fff}
      .math{font-family:'Cambria Math','Times New Roman',serif;font-style:italic}
    </style>
  </defs>
  <rect width="820" height="380" fill="#ffffff"/>
  <text x="34" y="40" class="t">¿Qué es un camino? Un recorrido dirigido, flechas cabeza-con-cola</text>

  <g stroke="#cbd5e1" stroke-width="1.6" fill="none" marker-end="url(#gg)">
    <line x1="118" y1="150" x2="182" y2="150"/><line x1="338" y1="150" x2="402" y2="150"/><line x1="558" y1="150" x2="622" y2="150"/>
    <line x1="228" y1="170" x2="290" y2="210"/>
  </g>
  <g stroke="#dc2626" stroke-width="3" fill="none" marker-end="url(#a)">
    <line x1="118" y1="146" x2="182" y2="146"/>
    <line x1="338" y1="146" x2="402" y2="146"/>
    <line x1="558" y1="146" x2="622" y2="146"/>
  </g>
  <g>
    <circle cx="100" cy="150" r="18" fill="#dc2626"/><text x="100" y="155" text-anchor="middle" class="nd">1</text>
    <circle cx="210" cy="150" r="16" fill="#f87171"/><text x="210" y="155" text-anchor="middle" class="nd">2</text>
    <circle cx="430" cy="150" r="16" fill="#f87171"/><text x="430" y="155" text-anchor="middle" class="nd">3</text>
    <circle cx="650" cy="150" r="18" fill="#dc2626"/><text x="650" y="155" text-anchor="middle" class="nd">4</text>
    <circle cx="300" cy="225" r="14" fill="#e5e7eb"/><text x="300" y="230" text-anchor="middle" class="nd" fill="#475569">5</text>
  </g>
  <text x="155" y="135" class="s" fill="#dc2626">α₁</text>
  <text x="375" y="135" class="s" fill="#dc2626">α₂</text>
  <text x="595" y="135" class="s" fill="#dc2626">α₃</text>

  <rect x="34" y="266" width="752" height="96" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="52" y="296" class="lbl">Un camino de longitud 3 de 1 a 4:</text>
  <text x="52" y="328" class="math" font-size="17" fill="#b91c1c" font-weight="700">p = α₃ α₂ α₁     (1 → 2 → 3 → 4)</text>
  <text x="52" y="352" class="s">Cada flecha termina donde empieza la siguiente.  Se lee de derecha a izquierda, como la composición.  Vértices/flechas pueden repetirse — es un <tspan class="math">recorrido</tspan>.</text>
</svg>
