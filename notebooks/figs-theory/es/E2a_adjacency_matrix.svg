<svg xmlns="http://www.w3.org/2000/svg" width="820" height="430" viewBox="0 0 820 430" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arB" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/></marker>
    <marker id="arG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/></marker>
    <marker id="arC" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
    <style>.t{font-size:21px;font-weight:700;fill:#0f172a}.s{font-size:13px;fill:#475569}.lbl{font-size:14px;font-weight:600;fill:#1e293b}.nd{font-size:13px;font-weight:700;fill:#fff}.math{font-family:'Cambria Math','Times New Roman',serif;font-style:italic}.ent{font-size:14px;font-weight:700;fill:#1e293b;text-anchor:middle}.zero{font-size:14px;fill:#cbd5e1;text-anchor:middle}.hi{font-size:14px;font-weight:700;fill:#1d4ed8;text-anchor:middle}.idx{font-size:12px;font-weight:700;fill:#475569;text-anchor:middle}</style>
  </defs>
  <rect width="820" height="430" fill="#ffffff"/>
  <text x="34" y="40" class="t">La matriz de adyacencia codifica las flechas</text>

  <!-- LEFT: diamond quiver -->
  <text x="60" y="78" class="lbl">Quiver diamante <tspan class="math">Q</tspan></text>

  <!-- arrows -->
  <line x1="150" y1="118" x2="92" y2="178" stroke="#3b82f6" stroke-width="2.2" marker-end="url(#arB)"/>
  <line x1="190" y1="118" x2="248" y2="178" stroke="#3b82f6" stroke-width="2.2" marker-end="url(#arB)"/>
  <line x1="92" y1="222" x2="150" y2="282" stroke="#10b981" stroke-width="2.2" marker-end="url(#arG)"/>
  <line x1="248" y1="222" x2="190" y2="282" stroke="#10b981" stroke-width="2.2" marker-end="url(#arG)"/>

  <!-- arrow labels -->
  <text x="106" y="150" class="s" font-style="italic" fill="#3b82f6">α₁</text>
  <text x="222" y="150" class="s" font-style="italic" fill="#3b82f6">α₂</text>
  <text x="100" y="262" class="s" font-style="italic" fill="#10b981">β₁</text>
  <text x="222" y="262" class="s" font-style="italic" fill="#10b981">β₂</text>

  <!-- nodes -->
  <circle cx="170" cy="105" r="18" fill="#3b82f6"/><text x="170" y="110" class="nd" text-anchor="middle">1</text>
  <circle cx="78" cy="200" r="18" fill="#334155"/><text x="78" y="205" class="nd" text-anchor="middle">2</text>
  <circle cx="262" cy="200" r="18" fill="#334155"/><text x="262" y="205" class="nd" text-anchor="middle">3</text>
  <circle cx="170" cy="295" r="18" fill="#10b981"/><text x="170" y="300" class="nd" text-anchor="middle">4</text>

  <!-- RIGHT: matrix -->
  <text x="460" y="78" class="lbl">Matriz de adyacencia <tspan class="math">A</tspan> (4×4)</text>

  <!-- column index labels (target j) -->
  <text x="500" y="110" class="idx">1</text>
  <text x="544" y="110" class="idx">2</text>
  <text x="588" y="110" class="idx">3</text>
  <text x="632" y="110" class="idx">4</text>
  <text x="544" y="98" class="s" text-anchor="middle">j (objetivo →)</text>

  <!-- row index labels (source i) -->
  <text x="465" y="143" class="idx">1</text>
  <text x="465" y="187" class="idx">2</text>
  <text x="465" y="231" class="idx">3</text>
  <text x="465" y="275" class="idx">4</text>
  <text x="448" y="210" class="s" transform="rotate(-90 448 210)" text-anchor="middle">i (fuente ↓)</text>

  <!-- grid -->
  <rect x="480" y="122" width="176" height="176" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" rx="6"/>
  <line x1="524" y1="122" x2="524" y2="298" stroke="#e2e8f0"/>
  <line x1="568" y1="122" x2="568" y2="298" stroke="#e2e8f0"/>
  <line x1="612" y1="122" x2="612" y2="298" stroke="#e2e8f0"/>
  <line x1="480" y1="166" x2="656" y2="166" stroke="#e2e8f0"/>
  <line x1="480" y1="210" x2="656" y2="210" stroke="#e2e8f0"/>
  <line x1="480" y1="254" x2="656" y2="254" stroke="#e2e8f0"/>

  <!-- highlighted cells -->
  <rect x="525" y="123" width="42" height="42" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <rect x="569" y="123" width="42" height="42" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <rect x="613" y="167" width="42" height="42" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  <rect x="613" y="211" width="42" height="42" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>

  <!-- row 1 -->
  <text x="502" y="149" class="zero">0</text>
  <text x="546" y="149" class="hi">1</text>
  <text x="590" y="149" class="hi">1</text>
  <text x="634" y="149" class="zero">0</text>
  <!-- row 2 -->
  <text x="502" y="193" class="zero">0</text>
  <text x="546" y="193" class="zero">0</text>
  <text x="590" y="193" class="zero">0</text>
  <text x="634" y="193" class="hi">1</text>
  <!-- row 3 -->
  <text x="502" y="237" class="zero">0</text>
  <text x="546" y="237" class="zero">0</text>
  <text x="590" y="237" class="zero">0</text>
  <text x="634" y="237" class="hi">1</text>
  <!-- row 4 -->
  <text x="502" y="281" class="zero">0</text>
  <text x="546" y="281" class="zero">0</text>
  <text x="590" y="281" class="zero">0</text>
  <text x="634" y="281" class="zero">0</text>

  <!-- caption -->
  <text x="460" y="330" class="s"><tspan class="math">A</tspan>[i, j] = número de flechas <tspan class="math">i</tspan> → <tspan class="math">j</tspan></text>

  <!-- callout: entry A[1,2] -> arrow α1 -->
  <path d="M527 144 C 400 144, 330 138, 162 128" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arC)"/>
  <text x="300" y="118" class="s" fill="#3b82f6">A[1,2] = 1  ⇝  α₁: 1→2</text>

  <!-- bottom strip -->
  <rect x="34" y="356" width="752" height="48" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5" rx="10"/>
  <text x="50" y="376" class="lbl" fill="#7c3aed">A registra los caminos de longitud 1.</text>
  <text x="50" y="395" class="s">Sus potencias <tspan class="math">A</tspan><tspan baseline-shift="super" font-size="11">k</tspan> contarán los caminos dirigidos de longitud <tspan class="math">k</tspan> — p. ej. <tspan class="math">A</tspan><tspan baseline-shift="super" font-size="11">2</tspan>[1,4] = 2 cuenta los dos caminos 1→2→4 y 1→3→4.</text>
</svg>