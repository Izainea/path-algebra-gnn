<svg xmlns="http://www.w3.org/2000/svg" width="820" height="380" viewBox="0 0 820 380" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arS" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker>
    <marker id="arB" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/></marker>
    <style>.t{font-size:21px;font-weight:700;fill:#0f172a}.s{font-size:13px;fill:#475569}.lbl{font-size:14px;font-weight:600;fill:#1e293b}.nd{font-size:13px;font-weight:700;fill:#fff}.math{font-family:'Cambria Math','Times New Roman',serif;font-style:italic}</style>
  </defs>
  <rect width="820" height="380" fill="#ffffff"/>
  <text x="34" y="40" class="t">Multiplicidad: 1 vs 2 vs 4 caminos paralelos</text>

  <!-- ===================== (a) LINE — n=1 ===================== -->
  <rect x="34" y="64" width="240" height="220" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="48" y="86" class="lbl">(a) Línea</text>

  <!-- edges -->
  <line x1="92" y1="130" x2="92" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arS)"/>
  <line x1="92" y1="186" x2="92" y2="226" stroke="#334155" stroke-width="2" marker-end="url(#arS)"/>
  <!-- nodes -->
  <circle cx="92" cy="116" r="15" fill="#3b82f6"/><text x="92" y="121" text-anchor="middle" class="nd">0</text>
  <circle cx="92" cy="178" r="15" fill="#94a3b8"/><text x="92" y="183" text-anchor="middle" class="nd">1</text>
  <circle cx="92" cy="240" r="15" fill="#10b981"/><text x="92" y="245" text-anchor="middle" class="nd">t</text>

  <text x="154" y="174" class="s">1 camino</text>
  <text x="48" y="270" class="s">n = 1, sin redundancia</text>

  <!-- ===================== (b) DIAMOND — n=2 ===================== -->
  <rect x="290" y="64" width="240" height="220" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="304" y="86" class="lbl">(b) Rombo</text>

  <!-- edges 0->1, 0->2 -->
  <line x1="403" y1="130" x2="364" y2="166" stroke="#3b82f6" stroke-width="2" marker-end="url(#arB)"/>
  <line x1="427" y1="130" x2="466" y2="166" stroke="#3b82f6" stroke-width="2" marker-end="url(#arB)"/>
  <!-- edges 1->t, 2->t -->
  <line x1="356" y1="190" x2="397" y2="226" stroke="#3b82f6" stroke-width="2" marker-end="url(#arB)"/>
  <line x1="474" y1="190" x2="433" y2="226" stroke="#3b82f6" stroke-width="2" marker-end="url(#arB)"/>
  <!-- nodes -->
  <circle cx="415" cy="116" r="15" fill="#3b82f6"/><text x="415" y="121" text-anchor="middle" class="nd">0</text>
  <circle cx="348" cy="178" r="15" fill="#94a3b8"/><text x="348" y="183" text-anchor="middle" class="nd">1</text>
  <circle cx="482" cy="178" r="15" fill="#94a3b8"/><text x="482" y="183" text-anchor="middle" class="nd">2</text>
  <circle cx="415" cy="240" r="15" fill="#10b981"/><text x="415" y="245" text-anchor="middle" class="nd">t</text>

  <text x="304" y="270" class="s">n = 2 (dos caminos de longitud 2)</text>

  <!-- ===================== (c) FAN — n=3 ===================== -->
  <rect x="546" y="64" width="240" height="220" rx="10" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="560" y="86" class="lbl">(c) Tres intermedios</text>

  <!-- edges 0->{1,2,3} -->
  <line x1="657" y1="130" x2="604" y2="166" stroke="#3b82f6" stroke-width="2" marker-end="url(#arB)"/>
  <line x1="666" y1="132" x2="666" y2="166" stroke="#3b82f6" stroke-width="2" marker-end="url(#arB)"/>
  <line x1="675" y1="130" x2="728" y2="166" stroke="#3b82f6" stroke-width="2" marker-end="url(#arB)"/>
  <!-- edges {1,2,3}->t -->
  <line x1="600" y1="190" x2="653" y2="226" stroke="#3b82f6" stroke-width="2" marker-end="url(#arB)"/>
  <line x1="666" y1="194" x2="666" y2="226" stroke="#3b82f6" stroke-width="2" marker-end="url(#arB)"/>
  <line x1="732" y1="190" x2="679" y2="226" stroke="#3b82f6" stroke-width="2" marker-end="url(#arB)"/>
  <!-- nodes -->
  <circle cx="666" cy="116" r="15" fill="#3b82f6"/><text x="666" y="121" text-anchor="middle" class="nd">0</text>
  <circle cx="592" cy="178" r="15" fill="#94a3b8"/><text x="592" y="183" text-anchor="middle" class="nd">1</text>
  <circle cx="666" cy="178" r="15" fill="#94a3b8"/><text x="666" y="183" text-anchor="middle" class="nd">2</text>
  <circle cx="740" cy="178" r="15" fill="#94a3b8"/><text x="740" y="183" text-anchor="middle" class="nd">3</text>
  <circle cx="666" cy="240" r="15" fill="#10b981"/><text x="666" y="245" text-anchor="middle" class="nd">t</text>

  <text x="560" y="270" class="s">n = 3 (tres caminos de longitud 2)</text>

  <!-- ===================== bottom strip ===================== -->
  <rect x="34" y="300" width="752" height="56" rx="8" fill="#fffbeb" stroke="#fde68a"/>
  <text x="48" y="324" class="s">Más caminos paralelos de igual longitud = más mensajes comprimidos juntos.</text>
  <text x="48" y="345" class="s">Multiplicidad <tspan class="math">n</tspan><tspan class="math" baseline-shift="sub" font-size="11">g</tspan><tspan class="math">(0, t)</tspan> = (<tspan class="math">A</tspan><tspan class="math" baseline-shift="super" font-size="11">g</tspan>)<tspan baseline-shift="sub" font-size="11" class="math">0, t</tspan>  — la multiplicidad de caminos es el motor del over-squashing.</text>
</svg>