<svg xmlns="http://www.w3.org/2000/svg" width="820" height="380" viewBox="0 0 820 380" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="arR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/></marker>
    <style>.t{font-size:21px;font-weight:700;fill:#0f172a}.s{font-size:13px;fill:#475569}.lbl{font-size:14px;font-weight:600;fill:#1e293b}.nd{font-size:13px;font-weight:700;fill:#fff}.math{font-family:'Cambria Math','Times New Roman',serif;font-style:italic}.pt{font-size:14px;font-weight:700;fill:#334155}</style>
  </defs>
  <rect width="820" height="380" fill="#ffffff"/>
  <text x="34" y="40" class="t">El paso de mensajes avanza un salto por capa</text>

  <!-- ===== PANEL 1: layer 1 ===== -->
  <g transform="translate(20,80)">
    <rect x="0" y="0" width="252" height="180" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="126" y="28" class="pt" text-anchor="middle">capa 1</text>

    <!-- edges -->
    <line x1="40" y1="100" x2="86" y2="100" stroke="#dc2626" stroke-width="3" marker-end="url(#arR)"/>
    <line x1="100" y1="100" x2="146" y2="100" stroke="#94a3b8" stroke-width="2" marker-end="url(#arG)"/>
    <line x1="160" y1="100" x2="206" y2="100" stroke="#94a3b8" stroke-width="2" marker-end="url(#arG)"/>
    <!-- nodes -->
    <circle cx="30" cy="100" r="14" fill="#f59e0b"/><text x="30" y="105" class="nd" text-anchor="middle">0</text>
    <circle cx="92" cy="100" r="14" fill="#94a3b8"/><text x="92" y="105" class="nd" text-anchor="middle">1</text>
    <circle cx="152" cy="100" r="14" fill="#94a3b8"/><text x="152" y="105" class="nd" text-anchor="middle">2</text>
    <circle cx="212" cy="100" r="14" fill="#10b981"/><text x="212" y="105" class="nd" text-anchor="middle">3</text>
    <text x="126" y="150" class="s" text-anchor="middle">alcanzado: nodo 1</text>
  </g>

  <!-- ===== PANEL 2: layer 2 ===== -->
  <g transform="translate(284,80)">
    <rect x="0" y="0" width="252" height="180" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="126" y="28" class="pt" text-anchor="middle">capa 2</text>

    <line x1="40" y1="100" x2="86" y2="100" stroke="#dc2626" stroke-width="3" marker-end="url(#arR)"/>
    <line x1="100" y1="100" x2="146" y2="100" stroke="#dc2626" stroke-width="3" marker-end="url(#arR)"/>
    <line x1="160" y1="100" x2="206" y2="100" stroke="#94a3b8" stroke-width="2" marker-end="url(#arG)"/>
    <circle cx="30" cy="100" r="14" fill="#334155"/><text x="30" y="105" class="nd" text-anchor="middle">0</text>
    <circle cx="92" cy="100" r="14" fill="#94a3b8"/><text x="92" y="105" class="nd" text-anchor="middle">1</text>
    <circle cx="152" cy="100" r="14" fill="#f59e0b"/><text x="152" y="105" class="nd" text-anchor="middle">2</text>
    <circle cx="212" cy="100" r="14" fill="#10b981"/><text x="212" y="105" class="nd" text-anchor="middle">3</text>
    <text x="126" y="150" class="s" text-anchor="middle">alcanzado: nodo 2</text>
  </g>

  <!-- ===== PANEL 3: layer 3 ===== -->
  <g transform="translate(548,80)">
    <rect x="0" y="0" width="252" height="180" rx="10" fill="#ecfdf5" stroke="#6ee7b7"/>
    <text x="126" y="28" class="pt" text-anchor="middle">capa 3</text>

    <line x1="40" y1="100" x2="86" y2="100" stroke="#dc2626" stroke-width="3" marker-end="url(#arR)"/>
    <line x1="100" y1="100" x2="146" y2="100" stroke="#dc2626" stroke-width="3" marker-end="url(#arR)"/>
    <line x1="160" y1="100" x2="206" y2="100" stroke="#dc2626" stroke-width="3" marker-end="url(#arR)"/>
    <circle cx="30" cy="100" r="14" fill="#334155"/><text x="30" y="105" class="nd" text-anchor="middle">0</text>
    <circle cx="92" cy="100" r="14" fill="#94a3b8"/><text x="92" y="105" class="nd" text-anchor="middle">1</text>
    <circle cx="152" cy="100" r="14" fill="#94a3b8"/><text x="152" y="105" class="nd" text-anchor="middle">2</text>
    <circle cx="212" cy="100" r="14" fill="#f59e0b" stroke="#10b981" stroke-width="3"/><text x="212" y="105" class="nd" text-anchor="middle">3</text>
    <text x="126" y="150" class="s" text-anchor="middle">alcanzado: nodo objetivo 3</text>
  </g>

  <!-- ===== bottom strip ===== -->
  <rect x="20" y="288" width="780" height="64" rx="10" fill="#fffbeb" stroke="#fde68a"/>
  <text x="410" y="313" class="lbl" text-anchor="middle">Para alcanzar un nodo a <tspan class="math">g</tspan> saltos de distancia necesitas <tspan class="math">g</tspan> capas</text>
  <text x="410" y="336" class="s" text-anchor="middle">— y todo lo que hay en el camino se comprime en cada paso.</text>
</svg>