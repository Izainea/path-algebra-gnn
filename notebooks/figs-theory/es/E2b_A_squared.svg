<svg xmlns="http://www.w3.org/2000/svg" width="820" height="430" viewBox="0 0 820 430" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <style>.t{font-size:21px;font-weight:700;fill:#0f172a}.s{font-size:13px;fill:#475569}.lbl{font-size:14px;font-weight:600;fill:#1e293b}.nd{font-size:13px;font-weight:700;fill:#fff}.math{font-family:'Cambria Math','Times New Roman',serif;font-style:italic}.cell{font-size:14px;fill:#1e293b}.op{font-size:26px;font-weight:700;fill:#334155}.key{font-size:15px;font-weight:700;fill:#dc2626}</style>
  </defs>
  <rect width="820" height="430" fill="#ffffff"/>
  <text x="34" y="40" class="t">A al cuadrado cuenta los caminos de longitud 2</text>

  <!-- ===== Matrix A ===== -->
  <text x="100" y="86" class="lbl" text-anchor="middle"><tspan class="math">A</tspan></text>
  <rect x="40" y="96" width="120" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <!-- highlight row 1 of A -->
  <rect x="42" y="98" width="116" height="29" rx="4" fill="#eff6ff" stroke="#bfdbfe"/>
  <!-- A matrix values: rows 1..4, j across -->
  <!-- row1 -->
  <text x="64"  y="118" class="cell" text-anchor="middle">0</text>
  <text x="94"  y="118" class="cell" text-anchor="middle">1</text>
  <text x="124" y="118" class="cell" text-anchor="middle">1</text>
  <text x="148" y="118" class="cell" text-anchor="middle">0</text>
  <!-- row2 -->
  <text x="64"  y="147" class="cell" text-anchor="middle">0</text>
  <text x="94"  y="147" class="cell" text-anchor="middle">0</text>
  <text x="124" y="147" class="cell" text-anchor="middle">0</text>
  <text x="148" y="147" class="cell" text-anchor="middle">1</text>
  <!-- row3 -->
  <text x="64"  y="176" class="cell" text-anchor="middle">0</text>
  <text x="94"  y="176" class="cell" text-anchor="middle">0</text>
  <text x="124" y="176" class="cell" text-anchor="middle">0</text>
  <text x="148" y="176" class="cell" text-anchor="middle">1</text>
  <!-- row4 -->
  <text x="64"  y="205" class="cell" text-anchor="middle">0</text>
  <text x="94"  y="205" class="cell" text-anchor="middle">0</text>
  <text x="124" y="205" class="cell" text-anchor="middle">0</text>
  <text x="148" y="205" class="cell" text-anchor="middle">0</text>

  <text x="380" y="162" class="op">×</text>

  <!-- ===== Matrix A (second factor) ===== -->
  <text x="290" y="86" class="lbl" text-anchor="middle"><tspan class="math">A</tspan></text>
  <rect x="230" y="96" width="120" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <!-- highlight column 4 of A -->
  <rect x="320" y="98" width="28" height="116" rx="4" fill="#ecfdf5" stroke="#6ee7b7"/>
  <!-- row1 -->
  <text x="254" y="118" class="cell" text-anchor="middle">0</text>
  <text x="284" y="118" class="cell" text-anchor="middle">1</text>
  <text x="314" y="118" class="cell" text-anchor="middle">1</text>
  <text x="334" y="118" class="cell" text-anchor="middle">0</text>
  <!-- row2 -->
  <text x="254" y="147" class="cell" text-anchor="middle">0</text>
  <text x="284" y="147" class="cell" text-anchor="middle">0</text>
  <text x="314" y="147" class="cell" text-anchor="middle">0</text>
  <text x="334" y="147" class="cell" text-anchor="middle">1</text>
  <!-- row3 -->
  <text x="254" y="176" class="cell" text-anchor="middle">0</text>
  <text x="284" y="176" class="cell" text-anchor="middle">0</text>
  <text x="314" y="176" class="cell" text-anchor="middle">0</text>
  <text x="334" y="176" class="cell" text-anchor="middle">1</text>
  <!-- row4 -->
  <text x="254" y="205" class="cell" text-anchor="middle">0</text>
  <text x="284" y="205" class="cell" text-anchor="middle">0</text>
  <text x="314" y="205" class="cell" text-anchor="middle">0</text>
  <text x="334" y="205" class="cell" text-anchor="middle">0</text>

  <text x="570" y="162" class="op">=</text>

  <!-- ===== Matrix A^2 ===== -->
  <text x="480" y="86" class="lbl" text-anchor="middle"><tspan class="math">A</tspan><tspan class="math" baseline-shift="super" font-size="11">2</tspan></text>
  <rect x="420" y="96" width="120" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <!-- highlight cell (1,4) -->
  <rect x="510" y="98" width="28" height="29" rx="4" fill="#fef2f2" stroke="#fecaca"/>
  <!-- row1: 0 0 0 2 -->
  <text x="444" y="118" class="cell" text-anchor="middle">0</text>
  <text x="474" y="118" class="cell" text-anchor="middle">0</text>
  <text x="504" y="118" class="cell" text-anchor="middle">0</text>
  <text x="524" y="118" class="key" text-anchor="middle">2</text>
  <!-- row2 -->
  <text x="444" y="147" class="cell" text-anchor="middle">0</text>
  <text x="474" y="147" class="cell" text-anchor="middle">0</text>
  <text x="504" y="147" class="cell" text-anchor="middle">0</text>
  <text x="524" y="147" class="cell" text-anchor="middle">0</text>
  <!-- row3 -->
  <text x="444" y="176" class="cell" text-anchor="middle">0</text>
  <text x="474" y="176" class="cell" text-anchor="middle">0</text>
  <text x="504" y="176" class="cell" text-anchor="middle">0</text>
  <text x="524" y="176" class="cell" text-anchor="middle">0</text>
  <!-- row4 -->
  <text x="444" y="205" class="cell" text-anchor="middle">0</text>
  <text x="474" y="205" class="cell" text-anchor="middle">0</text>
  <text x="504" y="205" class="cell" text-anchor="middle">0</text>
  <text x="524" y="205" class="cell" text-anchor="middle">0</text>

  <!-- index hints -->
  <text x="100" y="234" class="s" text-anchor="middle">fila <tspan font-weight="700" fill="#3b82f6">1</tspan> resaltada</text>
  <text x="290" y="234" class="s" text-anchor="middle">columna <tspan font-weight="700" fill="#10b981">4</tspan> resaltada</text>
  <text x="480" y="234" class="s" text-anchor="middle">(<tspan class="math">A</tspan><tspan class="math" baseline-shift="super" font-size="9">2</tspan>)[<tspan fill="#dc2626" font-weight="700">1,4</tspan>] = <tspan fill="#dc2626" font-weight="700">2</tspan></text>

  <!-- ===== Callout box ===== -->
  <rect x="606" y="96" width="190" height="120" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="616" y="118" class="s" fill="#1e293b" font-weight="600">fila 1 de <tspan class="math">A</tspan> · columna 4 de <tspan class="math">A</tspan></text>
  <text x="616" y="141" class="s">= (1·1) + (1·1) = <tspan fill="#dc2626" font-weight="700">2</tspan></text>
  <text x="616" y="166" class="s">los dos caminos de longitud 2:</text>
  <text x="616" y="187" class="s"><tspan fill="#3b82f6" font-weight="700">1</tspan> → <tspan fill="#f59e0b" font-weight="700">2</tspan> → <tspan fill="#10b981" font-weight="700">4</tspan></text>
  <text x="616" y="206" class="s"><tspan fill="#3b82f6" font-weight="700">1</tspan> → <tspan fill="#f59e0b" font-weight="700">3</tspan> → <tspan fill="#10b981" font-weight="700">4</tspan></text>

  <!-- ===== Bottom strip ===== -->
  <rect x="40" y="320" width="740" height="74" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="410" y="352" text-anchor="middle" class="lbl" font-size="16">(<tspan class="math">A</tspan><tspan class="math" baseline-shift="super" font-size="11">g</tspan>)[<tspan class="math">i</tspan>,<tspan class="math">j</tspan>] = número de recorridos de longitud <tspan class="math">g</tspan> <tspan class="math">i</tspan> ⇝ <tspan class="math">j</tspan></text>
  <text x="410" y="378" text-anchor="middle" class="s" font-size="14" fill="#1e40af">Potencias de la matriz = conteo de caminos.</text>

  <!-- tiny quiver reminder of the example graph 1->2,1->3,2->4,3->4 -->
  <text x="700" y="248" class="s" text-anchor="middle">grafo: 1→2, 1→3, 2→4, 3→4</text>
</svg>