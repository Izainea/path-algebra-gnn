<svg xmlns="http://www.w3.org/2000/svg" width="820" height="430" viewBox="0 0 820 430" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arB" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/></marker>
    <marker id="arR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/></marker>
    <style>.t{font-size:21px;font-weight:700;fill:#0f172a}.s{font-size:13px;fill:#475569}.lbl{font-size:14px;font-weight:600;fill:#1e293b}.nd{font-size:13px;font-weight:700;fill:#fff}.math{font-family:'Cambria Math','Times New Roman',serif;font-style:italic}.cap{font-size:13px;font-weight:700;fill:#dc2626}</style>
  </defs>
  <rect width="820" height="430" fill="#ffffff"/>
  <text x="34" y="40" class="t">Los mensajes se apilan en un solo vector</text>

  <!-- Source nodes on the left, 8 of them -->
  <g>
    <circle cx="80" cy="80" r="15" fill="#3b82f6"/><text x="80" y="85" text-anchor="middle" class="nd">u₁</text>
    <circle cx="80" cy="120" r="15" fill="#3b82f6"/><text x="80" y="125" text-anchor="middle" class="nd">u₂</text>
    <circle cx="80" cy="160" r="15" fill="#3b82f6"/><text x="80" y="165" text-anchor="middle" class="nd">u₃</text>
    <circle cx="80" cy="200" r="15" fill="#3b82f6"/><text x="80" y="205" text-anchor="middle" class="nd">u₄</text>
    <circle cx="80" cy="240" r="15" fill="#3b82f6"/><text x="80" y="245" text-anchor="middle" class="nd">u₅</text>
    <circle cx="80" cy="280" r="15" fill="#3b82f6"/><text x="80" y="285" text-anchor="middle" class="nd">u₆</text>
    <circle cx="80" cy="320" r="15" fill="#3b82f6"/><text x="80" y="325" text-anchor="middle" class="nd">u₇</text>
    <circle cx="80" cy="360" r="15" fill="#3b82f6"/><text x="80" y="365" text-anchor="middle" class="nd">u₈</text>
  </g>

  <!-- Incoming colored arrows all pointing into j -->
  <g fill="none" stroke-width="2.2">
    <path d="M99,80  C260,80  340,200 388,222" stroke="#3b82f6" marker-end="url(#arB)"/>
    <path d="M99,120 C260,120 340,205 388,224" stroke="#10b981" marker-end="url(#arB)"/>
    <path d="M99,160 C260,160 340,210 388,226" stroke="#f59e0b" marker-end="url(#arB)"/>
    <path d="M99,200 C260,200 350,214 388,228" stroke="#7c3aed" marker-end="url(#arB)"/>
    <path d="M99,240 C260,240 350,222 388,230" stroke="#0ea5e9" marker-end="url(#arB)"/>
    <path d="M99,280 C260,280 350,234 388,232" stroke="#ec4899" marker-end="url(#arB)"/>
    <path d="M99,320 C260,320 340,250 388,234" stroke="#14b8a6" marker-end="url(#arB)"/>
    <path d="M99,360 C260,360 340,270 388,236" stroke="#94a3b8" marker-end="url(#arB)"/>
  </g>

  <!-- Target node j -->
  <circle cx="430" cy="228" r="20" fill="#10b981"/>
  <text x="430" y="233" text-anchor="middle" class="nd">j</text>
  <text x="430" y="272" text-anchor="middle" class="s">nodo objetivo</text>

  <!-- Vector box (fixed capacity) on the right -->
  <g>
    <!-- outer box -->
    <rect x="560" y="70" width="120" height="290" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <text x="620" y="60" text-anchor="middle" class="lbl">vector fijo <tspan class="math">h</tspan><tspan class="math" baseline-shift="sub" font-size="11">j</tspan></text>

    <!-- stacked blocks from bottom; capacity line at y=170 -->
    <!-- below capacity (fit) -->
    <rect x="568" y="332" width="104" height="22" rx="3" fill="#3b82f6"/>
    <rect x="568" y="308" width="104" height="22" rx="3" fill="#10b981"/>
    <rect x="568" y="284" width="104" height="22" rx="3" fill="#f59e0b"/>
    <rect x="568" y="260" width="104" height="22" rx="3" fill="#7c3aed"/>
    <rect x="568" y="236" width="104" height="22" rx="3" fill="#0ea5e9"/>
    <rect x="568" y="212" width="104" height="22" rx="3" fill="#ec4899"/>
    <rect x="568" y="188" width="104" height="22" rx="3" fill="#14b8a6"/>

    <!-- dashed capacity line -->
    <line x1="552" y1="176" x2="688" y2="176" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="694" y="180" class="cap" text-anchor="start">capacidad</text>

    <!-- overflow blocks above the line (red) -->
    <rect x="568" y="152" width="104" height="22" rx="3" fill="#dc2626" opacity="0.9"/>
    <rect x="568" y="128" width="104" height="22" rx="3" fill="#dc2626" opacity="0.75"/>
    <text x="620" y="118" text-anchor="middle" class="cap">desbordamiento</text>
  </g>

  <!-- Arrow from j into the box -->
  <path d="M452,228 C490,228 520,215 556,215" fill="none" stroke="#dc2626" stroke-width="2.4" marker-end="url(#arR)"/>

  <!-- Caption -->
  <text x="34" y="392" class="s">todos los mensajes entrantes deben caber en un solo vector fijo</text>
  <text x="34" y="416" class="lbl">Cuando la pila excede la capacidad, el receptor no puede desenredar los mensajes — sobre-compresión.</text>
</svg>