<svg xmlns="http://www.w3.org/2000/svg" width="820" height="470" viewBox="0 0 820 470" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arP" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/></marker>
    <marker id="arB" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/></marker>
    <style>
      .t{font-size:21px;font-weight:700;fill:#0f172a}
      .s{font-size:13px;fill:#475569}
      .lbl{font-size:14px;font-weight:600;fill:#1e293b}
      .nd{font-size:14px;font-weight:700;fill:#fff}
      .math{font-family:'Cambria Math','Times New Roman',serif;font-style:italic}
      .key{font-size:16px;font-weight:700;fill:#7c3aed}
      .eqbox{fill:#faf5ff;stroke:#d8b4fe}
    </style>
  </defs>
  <rect width="820" height="470" fill="#ffffff"/>
  <text x="34" y="40" class="t">Los caminos son la base del álgebra de caminos <tspan class="math">kQ</tspan></text>

  <text x="60" y="92" class="lbl">Un quiver Q</text>
  <g>
    <line x1="92" y1="172" x2="168" y2="130" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#arP)"/>
    <line x1="92" y1="192" x2="168" y2="234" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arB)"/>
    <line x1="212" y1="130" x2="288" y2="172" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#arP)"/>
    <line x1="212" y1="234" x2="288" y2="192" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arB)"/>
    <circle cx="80" cy="182" r="18" fill="#334155"/><text x="80" y="187" text-anchor="middle" class="nd">1</text>
    <circle cx="190" cy="120" r="16" fill="#94a3b8"/><text x="190" y="125" text-anchor="middle" class="nd">2</text>
    <circle cx="190" cy="244" r="16" fill="#94a3b8"/><text x="190" y="249" text-anchor="middle" class="nd">3</text>
    <circle cx="300" cy="182" r="18" fill="#334155"/><text x="300" y="187" text-anchor="middle" class="nd">4</text>
    <text x="118" y="140" class="s" fill="#7c3aed">α₁</text>
    <text x="118" y="230" class="s" fill="#2563eb">α₂</text>
    <text x="256" y="140" class="s" fill="#7c3aed">β₁</text>
    <text x="256" y="230" class="s" fill="#2563eb">β₂</text>
  </g>
  <text x="60" y="296" class="s">Dos recorridos dirigidos 1 → 4 de longitud 2:</text>
  <text x="74" y="318" class="lbl" fill="#7c3aed">p₁ = β₁α₁</text>
  <text x="200" y="318" class="lbl" fill="#2563eb">p₂ = β₂α₂</text>
  <text x="60" y="338" class="s">(se leen de derecha a izquierda, como la composición)</text>

  <text x="430" y="92" class="lbl">La pieza graduada los selecciona</text>
  <rect x="430" y="108" width="356" height="76" rx="8" class="eqbox"/>
  <text x="448" y="140" class="key math">e₄ · kQ₂ · e₁</text>
  <text x="596" y="140" class="s">= gen{ </text>
  <text x="640" y="140" class="lbl math" fill="#7c3aed">p₁</text>
  <text x="660" y="140" class="s">, </text>
  <text x="672" y="140" class="lbl math" fill="#2563eb">p₂</text>
  <text x="692" y="140" class="s">}</text>
  <text x="448" y="170" class="s">e₄ (objetivo = 4) · caminos de longitud 2 · e₁ (fuente = 1)</text>

  <rect x="430" y="200" width="356" height="120" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="448" y="230" class="lbl">Proposición</text>
  <text x="448" y="266" class="key math" font-size="19">dim<tspan font-size="13" baseline-shift="sub">k</tspan>(e₄ · kQ₂ · e₁)  =  (A²)₁₄  =  2</text>
  <text x="448" y="294" class="s">dimensión sobre k  =  nº de recorridos 1→4 de longitud 2</text>
  <text x="448" y="312" class="s">=  la entrada (1,4) de la matriz de adyacencia al cuadrado</text>

  <line x1="34" y1="350" x2="786" y2="350" stroke="#e2e8f0"/>
  <text x="34" y="382" class="lbl">En general:</text>
  <text x="130" y="384" class="key math" font-size="20">dim<tspan font-size="13" baseline-shift="sub">k</tspan>( e<tspan baseline-shift="sub" font-size="12">j</tspan> · kQ<tspan baseline-shift="sub" font-size="12">g</tspan> · e<tspan baseline-shift="sub" font-size="12">i</tspan> )  =  (A<tspan baseline-shift="super" font-size="12">g</tspan>)<tspan baseline-shift="sub" font-size="12">ij</tspan>  =  n<tspan baseline-shift="sub" font-size="12">g</tspan>(i, j)</text>
  <text x="34" y="420" class="s">“el nº de recorridos de longitud g i→j” = la multiplicidad de mensajes que una GNN aprieta tras g capas.</text>
  <text x="34" y="448" class="s" fill="#7c3aed" font-weight="600">Esta única identidad es la base computacional de todo el método.</text>
</svg>
