<svg xmlns="http://www.w3.org/2000/svg" width="820" height="380" viewBox="0 0 820 380" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="arB" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/></marker>
    <style>.t{font-size:21px;font-weight:700;fill:#0f172a}.s{font-size:13px;fill:#475569}.lbl{font-size:14px;font-weight:600;fill:#1e293b}.nd{font-size:13px;font-weight:700;fill:#fff}.math{font-family:'Cambria Math','Times New Roman',serif;font-style:italic}.walk{font-size:14px;font-weight:700;fill:#2563eb}.cap{font-size:13px;fill:#1e3a8a}</style>
  </defs>
  <rect width="820" height="380" fill="#ffffff"/>
  <text x="34" y="40" class="t">Los recorridos pueden repetir; no hay problema</text>

  <!-- LEFT: the graph -->
  <text x="60" y="76" class="lbl">Un grafo pequeño con un ciclo</text>

  <!-- highlighted-walk edges (blue, drawn first so they sit under nodes) -->
  <!-- 1 -> 2 -->
  <line x1="118" y1="148" x2="222" y2="120" stroke="#3b82f6" stroke-width="3" marker-end="url(#arB)"/>
  <!-- 2 -> 3 -->
  <line x1="248" y1="138" x2="248" y2="220" stroke="#3b82f6" stroke-width="3" marker-end="url(#arB)"/>
  <!-- 3 -> 1 -->
  <line x1="222" y1="238" x2="118" y2="168" stroke="#3b82f6" stroke-width="3" marker-end="url(#arB)"/>
  <!-- 1 -> 4 -->
  <line x1="112" y1="180" x2="150" y2="270" stroke="#3b82f6" stroke-width="3" marker-end="url(#arB)"/>

  <!-- nodes -->
  <circle cx="100" cy="158" r="20" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="100" y="163" text-anchor="middle" class="nd">1</text>
  <circle cx="240" cy="112" r="20" fill="#334155"/>
  <text x="240" y="117" text-anchor="middle" class="nd">2</text>
  <circle cx="240" cy="240" r="20" fill="#334155"/>
  <text x="240" y="245" text-anchor="middle" class="nd">3</text>
  <circle cx="160" cy="292" r="20" fill="#334155"/>
  <text x="160" y="297" text-anchor="middle" class="nd">4</text>

  <text x="86" y="120" class="s">revisitado</text>

  <!-- RIGHT: walk + contrast -->
  <text x="420" y="76" class="lbl">El recorrido resaltado</text>
  <rect x="420" y="88" width="372" height="58" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="438" y="115" class="walk">1 → 2 → 3 → 1 → 4</text>
  <text x="438" y="136" class="s">un recorrido: los vértices pueden repetirse (el vértice 1 aparece dos veces)</text>

  <text x="420" y="178" class="lbl">Contraste: un camino simple</text>
  <rect x="420" y="190" width="372" height="50" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="438" y="214" class="s" font-weight="600" fill="#64748b">1 → 2 → 3   (ningún vértice se repite)</text>
  <text x="438" y="232" class="s">noción más ligera — usada con menos frecuencia aquí</text>

  <!-- BOTTOM caption strip -->
  <rect x="34" y="300" width="752" height="58" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="50" y="324" class="cap">Contamos <tspan font-weight="700">RECORRIDOS</tspan> (se permiten repeticiones), que es exactamente lo que cuenta <tspan class="math">(A</tspan><tspan class="math" baseline-shift="super" font-size="11">g</tspan><tspan class="math">)</tspan><tspan class="math">[i,j]</tspan>.</text>
  <text x="50" y="346" class="cap">En grafos acíclicos, recorridos = caminos simples.</text>
</svg>