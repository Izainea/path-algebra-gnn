<svg xmlns="http://www.w3.org/2000/svg" width="820" height="430" viewBox="0 0 820 430" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#cbd5e1"/></marker>
    <style>
      .t{font-size:21px;font-weight:700;fill:#0f172a}
      .s{font-size:13px;fill:#475569}
      .lbl{font-size:14px;font-weight:600;fill:#1e293b}
      .nd{font-size:12px;font-weight:700;fill:#fff}
      .math{font-family:'Cambria Math','Times New Roman',serif;font-style:italic}
      .key{font-size:17px;font-weight:700;fill:#b91c1c}
    </style>
  </defs>
  <rect width="820" height="430" fill="#ffffff"/>
  <text x="34" y="40" class="t">Por qué un cuello de botella causa over-squashing</text>

  <g stroke="#cbd5e1" stroke-width="1.4" fill="none" marker-end="url(#a)">
    <line x1="92" y1="100" x2="190" y2="150"/><line x1="92" y1="150" x2="190" y2="150"/><line x1="92" y1="200" x2="190" y2="150"/>
    <line x1="92" y1="100" x2="190" y2="200"/><line x1="92" y1="150" x2="190" y2="200"/><line x1="92" y1="200" x2="190" y2="200"/>
    <line x1="220" y1="150" x2="300" y2="150"/><line x1="220" y1="200" x2="300" y2="150"/><line x1="220" y1="150" x2="300" y2="200"/><line x1="220" y1="200" x2="300" y2="200"/>
    <line x1="330" y1="150" x2="412" y2="175"/><line x1="330" y1="200" x2="412" y2="175"/>
  </g>
  <g>
    <circle cx="80" cy="100" r="13" fill="#3b82f6"/><circle cx="80" cy="150" r="13" fill="#3b82f6"/><circle cx="80" cy="200" r="13" fill="#3b82f6"/>
    <circle cx="205" cy="150" r="12" fill="#f59e0b"/><circle cx="205" cy="200" r="12" fill="#f59e0b"/>
    <circle cx="315" cy="150" r="12" fill="#f59e0b"/><circle cx="315" cy="200" r="12" fill="#f59e0b"/>
    <circle cx="425" cy="175" r="15" fill="#10b981"/><text x="425" y="180" text-anchor="middle" class="nd">t</text>
  </g>
  <text x="80" y="235" text-anchor="middle" class="s" fill="#2563eb">K fuentes</text>
  <text x="260" y="235" text-anchor="middle" class="s" fill="#b45309">d capas de M</text>
  <text x="425" y="208" text-anchor="middle" class="s" fill="#059669">objetivo</text>

  <rect x="470" y="78" width="316" height="116" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="488" y="106" class="lbl">Recorridos de una fuente al objetivo</text>
  <text x="488" y="142" class="key math">n<tspan baseline-shift="sub" font-size="12">d+1</tspan>(fuente, t)  =  M<tspan baseline-shift="super" font-size="12">d</tspan></text>
  <text x="488" y="172" class="s">total hacia el objetivo:  <tspan class="math" font-weight="700" fill="#b91c1c">~ K · M^d</tspan>  (¡crece rápido!)</text>

  <rect x="470" y="214" width="316" height="180" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="488" y="242" class="lbl">…pero el vector del objetivo tiene ancho fijo</text>
  <rect x="500" y="258" width="40" height="110" fill="none" stroke="#334155" stroke-width="2"/>
  <rect x="500" y="318" width="40" height="50" fill="#3b82f6" opacity="0.6"/>
  <text x="520" y="386" text-anchor="middle" class="s">capacidad</text>
  <text x="560" y="290" class="s">d=1 → 3·3 = 9 mensajes</text>
  <text x="560" y="316" class="s">d=2 → 3·9 = 27 mensajes</text>
  <text x="560" y="342" class="s">d=3 → 3·27 = 81 mensajes</text>
  <text x="560" y="372" class="s" fill="#b91c1c" font-weight="700">→ desborde = señal perdida</text>
</svg>
