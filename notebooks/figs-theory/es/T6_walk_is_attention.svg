<svg xmlns="http://www.w3.org/2000/svg" width="820" height="440" viewBox="0 0 820 440" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <style>
      .t{font-size:21px;font-weight:700;fill:#0f172a}
      .s{font-size:13px;fill:#475569}
      .lbl{font-size:14px;font-weight:600;fill:#1e293b}
      .math{font-family:'Cambria Math','Times New Roman',serif;font-style:italic}
      .big{font-size:18px;font-weight:700}
    </style>
  </defs>
  <rect width="820" height="440" fill="#ffffff"/>
  <text x="34" y="40" class="t">El operador de walk <tspan class="math">es</tspan> atención</text>

  <rect x="34" y="64" width="360" height="150" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="52" y="90" class="lbl">Atención de Transformer</text>
  <text x="52" y="124" class="big math" fill="#4338ca">h_j = Σ_i  α_ji · v_i</text>
  <text x="52" y="152" class="s">soporte: <tspan font-weight="700">todos los pares</tspan>   ·   pesos: <tspan font-weight="700">aprendidos</tspan> (q·k)</text>
  <text x="52" y="178" class="s">alcance global, pero O(n²) e ignora la estructura</text>
  <text x="52" y="200" class="s">del grafo salvo que se reinyecte con codificaciones.</text>

  <rect x="426" y="64" width="360" height="150" rx="10" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="444" y="90" class="lbl">Agregación sobre walks (rango g)</text>
  <text x="444" y="124" class="big math" fill="#047857">h_j = Σ_i  W_ji · h_i</text>
  <text x="444" y="152" class="s">soporte: <tspan font-weight="700">alcanzable por walks</tspan> (i ⇝ j de longitud g)</text>
  <text x="444" y="178" class="s">el álgebra de caminos da exactamente qué (i,j)</text>
  <text x="444" y="200" class="s">están conectados — el patrón no-cero de Aᵍ.</text>

  <text x="410" y="248" text-anchor="middle" class="big" fill="#334155">la misma forma — una suma ponderada sobre fuentes</text>

  <rect x="34" y="266" width="752" height="146" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="52" y="294" class="lbl">Walk Attention = tomar el soporte del álgebra, aprender los pesos:</text>
  <text x="52" y="332" class="big math" fill="#7c3aed">α_ji = softmax sobre { i : (i ⇝ j, longitud g) } ( q_j · k_i )</text>
  <text x="52" y="366" class="s">•  el álgebra dice <tspan font-weight="700">QUIÉN</tspan> puede atender a quién a través de muchos saltos (una máscara sparse)</text>
  <text x="52" y="390" class="s">•  la atención aprende <tspan font-weight="700">CUÁNTO</tspan> importa cada fuente — así puede <tspan font-weight="700">seleccionar</tspan>, no solo alcanzar.</text>
</svg>
