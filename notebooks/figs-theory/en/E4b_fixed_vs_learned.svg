<svg xmlns="http://www.w3.org/2000/svg" width="820" height="420" viewBox="0 0 820 420" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arGray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="arGrayThin" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#cbd5e1"/></marker>
    <marker id="arGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/></marker>
    <style>.t{font-size:21px;font-weight:700;fill:#0f172a}.s{font-size:13px;fill:#475569}.lbl{font-size:14px;font-weight:600;fill:#1e293b}.nd{font-size:13px;font-weight:700;fill:#fff}.math{font-family:'Cambria Math','Times New Roman',serif;font-style:italic}.w{font-size:12px;font-weight:700;fill:#334155}.wbig{font-size:12px;font-weight:700;fill:#059669}.cap{font-size:12px;fill:#64748b;font-style:italic}</style>
  </defs>
  <rect width="820" height="420" fill="#ffffff"/>
  <text x="34" y="40" class="t">Fixed weights vs learned weights</text>

  <!-- ===================== LEFT PANEL ===================== -->
  <rect x="34" y="62" width="370" height="262" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="56" y="88" class="lbl">walkraw (fixed)</text>

  <!-- source nodes -->
  <circle cx="100" cy="130" r="18" fill="#3b82f6"/>
  <text x="100" y="135" text-anchor="middle" class="nd">s₁</text>
  <circle cx="100" cy="195" r="18" fill="#3b82f6"/>
  <text x="100" y="200" text-anchor="middle" class="nd">s₂</text>
  <circle cx="100" cy="260" r="18" fill="#3b82f6"/>
  <text x="100" y="265" text-anchor="middle" class="nd">s₃</text>
  <!-- target -->
  <circle cx="330" cy="195" r="20" fill="#10b981"/>
  <text x="330" y="200" text-anchor="middle" class="nd">t</text>

  <!-- equal-thickness arrows -->
  <line x1="120" y1="134" x2="308" y2="186" stroke="#94a3b8" stroke-width="4" marker-end="url(#arGray)"/>
  <line x1="120" y1="195" x2="306" y2="195" stroke="#94a3b8" stroke-width="4" marker-end="url(#arGray)"/>
  <line x1="120" y1="256" x2="308" y2="204" stroke="#94a3b8" stroke-width="4" marker-end="url(#arGray)"/>
  <!-- weight labels -->
  <text x="210" y="148" text-anchor="middle" class="w">0.33</text>
  <text x="210" y="188" text-anchor="middle" class="w">0.33</text>
  <text x="210" y="242" text-anchor="middle" class="w">0.33</text>

  <text x="219" y="300" text-anchor="middle" class="cap">weighted by multiplicity — cannot select</text>

  <!-- ===================== RIGHT PANEL ===================== -->
  <rect x="416" y="62" width="370" height="262" rx="10" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="438" y="88" class="lbl">WalkAttention (learned)</text>

  <!-- source nodes -->
  <circle cx="482" cy="130" r="18" fill="#3b82f6"/>
  <text x="482" y="135" text-anchor="middle" class="nd">s₁</text>
  <circle cx="482" cy="195" r="18" fill="#3b82f6"/>
  <text x="482" y="200" text-anchor="middle" class="nd">s₂</text>
  <circle cx="482" cy="260" r="18" fill="#3b82f6"/>
  <text x="482" y="265" text-anchor="middle" class="nd">s₃</text>
  <!-- target -->
  <circle cx="712" cy="195" r="20" fill="#10b981"/>
  <text x="712" y="200" text-anchor="middle" class="nd">t</text>

  <!-- learned arrows: thin / thick / thin -->
  <line x1="502" y1="134" x2="690" y2="186" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arGrayThin)"/>
  <line x1="502" y1="195" x2="688" y2="195" stroke="#10b981" stroke-width="8" marker-end="url(#arGreen)"/>
  <line x1="502" y1="256" x2="690" y2="204" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arGrayThin)"/>
  <!-- weight labels -->
  <text x="592" y="148" text-anchor="middle" class="w">0.04</text>
  <text x="592" y="186" text-anchor="middle" class="wbig">0.92</text>
  <text x="592" y="242" text-anchor="middle" class="w">0.04</text>

  <text x="601" y="300" text-anchor="middle" class="cap">learns which source matters — selects</text>

  <!-- ===================== BOTTOM STRIP ===================== -->
  <rect x="34" y="344" width="752" height="52" rx="8" fill="#fffbeb" stroke="#fde68a"/>
  <text x="410" y="368" text-anchor="middle" class="s">Same multi-hop support; the only difference is fixed vs learned weights.</text>
  <text x="410" y="386" text-anchor="middle" class="lbl">That difference is decisive.</text>
</svg>