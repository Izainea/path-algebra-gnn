<svg xmlns="http://www.w3.org/2000/svg" width="820" height="400" viewBox="0 0 820 400" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/></marker>
    <marker id="arA" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#f59e0b"/></marker>
    <marker id="arG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/></marker>
    <marker id="arGt" markerWidth="12" markerHeight="12" refX="7" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#10b981"/></marker>
    <style>.t{font-size:21px;font-weight:700;fill:#0f172a}.s{font-size:13px;fill:#475569}.lbl{font-size:14px;font-weight:600;fill:#1e293b}.nd{font-size:13px;font-weight:700;fill:#fff}.math{font-family:'Cambria Math','Times New Roman',serif;font-style:italic}.vr{font-size:13px;font-weight:700}</style>
  </defs>
  <rect width="820" height="400" fill="#ffffff"/>
  <text x="34" y="40" class="t">Why each model wins or loses</text>

  <!-- ROW 1: GAT (red) -->
  <rect x="34" y="64" width="752" height="78" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="52" y="88" class="lbl" fill="#dc2626">GAT — 1 hop</text>
  <!-- diagram: source, 1-hop reach, then a bottleneck wall the arrow can't cross -->
  <circle cx="70" cy="118" r="12" fill="#334155"/><text x="70" y="122" text-anchor="middle" class="nd">s</text>
  <line x1="84" y1="118" x2="118" y2="118" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arR)"/>
  <circle cx="132" cy="118" r="12" fill="#94a3b8"/>
  <!-- bottleneck wall -->
  <line x1="158" y1="100" x2="158" y2="136" stroke="#dc2626" stroke-width="3" stroke-dasharray="3 3"/>
  <text x="158" y="148" text-anchor="middle" class="s" fill="#dc2626">bottleneck</text>
  <circle cx="200" cy="118" r="12" fill="#334155" opacity="0.35"/><text x="200" y="122" text-anchor="middle" class="nd">t</text>
  <text x="430" y="114" class="vr" fill="#dc2626">can't cross the bottleneck</text>
  <text x="430" y="132" class="s">reach stops at 1 hop → outcome left to <tspan font-weight="700" fill="#dc2626">chance</tspan></text>

  <!-- ROW 2: Walk operator (amber) -->
  <rect x="34" y="156" width="752" height="78" rx="10" fill="#fffbeb" stroke="#fde68a"/>
  <text x="52" y="180" class="lbl" fill="#b45309">Walk operator — multi-hop, equal weights</text>
  <!-- diagram: s through 2 middle nodes to t, all equal arrows -->
  <circle cx="70" cy="210" r="12" fill="#334155"/><text x="70" y="214" text-anchor="middle" class="nd">s</text>
  <line x1="84" y1="210" x2="116" y2="210" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arA)"/>
  <circle cx="130" cy="210" r="12" fill="#94a3b8"/>
  <line x1="144" y1="210" x2="176" y2="210" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arA)"/>
  <circle cx="190" cy="210" r="12" fill="#94a3b8"/>
  <line x1="204" y1="210" x2="236" y2="210" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arA)"/>
  <circle cx="250" cy="210" r="12" fill="#334155"/><text x="250" y="214" text-anchor="middle" class="nd">t</text>
  <text x="430" y="206" class="vr" fill="#b45309">reaches but can't select</text>
  <text x="430" y="224" class="s">all paths weighted equally → signal diluted → <tspan font-weight="700" fill="#b45309">partial</tspan></text>

  <!-- ROW 3: Walk Attention (green) -->
  <rect x="34" y="248" width="752" height="78" rx="10" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="52" y="272" class="lbl" fill="#047857">Walk Attention — multi-hop + learned weights</text>
  <!-- diagram: s through 2 middle to t, one thick selected arrow path -->
  <circle cx="70" cy="302" r="12" fill="#10b981"/><text x="70" y="306" text-anchor="middle" class="nd">s</text>
  <line x1="84" y1="302" x2="115" y2="302" stroke="#10b981" stroke-width="5" marker-end="url(#arGt)"/>
  <circle cx="130" cy="302" r="12" fill="#34d399"/>
  <line x1="144" y1="302" x2="175" y2="302" stroke="#10b981" stroke-width="5" marker-end="url(#arGt)"/>
  <circle cx="190" cy="302" r="12" fill="#34d399"/>
  <line x1="204" y1="302" x2="235" y2="302" stroke="#10b981" stroke-width="5" marker-end="url(#arGt)"/>
  <circle cx="250" cy="302" r="12" fill="#10b981"/><text x="250" y="306" text-anchor="middle" class="nd">t</text>
  <text x="430" y="298" class="vr" fill="#047857">reaches AND selects</text>
  <text x="430" y="316" class="s">attention thickens the right path → <tspan font-weight="700" fill="#047857">solves it</tspan></text>

  <!-- BOTTOM strip -->
  <rect x="34" y="342" width="752" height="38" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="410" y="366" text-anchor="middle" class="s"><tspan font-weight="700" fill="#0f172a">Necessary:</tspan> multi-hop reach.   <tspan font-weight="700" fill="#0f172a">Sufficient:</tspan> + learned selection.</text>
</svg>