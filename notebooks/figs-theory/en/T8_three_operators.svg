<svg xmlns="http://www.w3.org/2000/svg" width="820" height="430" viewBox="0 0 820 430" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="g1" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#dc2626"/></marker>
    <marker id="g2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#f59e0b"/></marker>
    <marker id="g3" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#10b981"/></marker>
    <marker id="gg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#e5e7eb"/></marker>
    <style>
      .t{font-size:21px;font-weight:700;fill:#0f172a}
      .s{font-size:12px;fill:#475569}
      .lbl{font-size:14px;font-weight:700;fill:#1e293b}
      .nd{font-size:11px;font-weight:700;fill:#fff}
      .res{font-size:13px;font-weight:700}
    </style>
  </defs>
  <rect width="820" height="430" fill="#ffffff"/>
  <text x="34" y="40" class="t">Three operators on the same graph</text>

  <!-- panel template: diamond 0->{1,2}->3 -->
  <!-- GAT -->
  <rect x="34" y="64" width="240" height="250" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="154" y="92" text-anchor="middle" class="lbl" fill="#b91c1c">GAT</text>
  <text x="154" y="110" text-anchor="middle" class="s">1-hop · learned</text>
  <g>
    <line x1="78" y1="200" x2="120" y2="160" stroke="#dc2626" stroke-width="3" marker-end="url(#g1)"/>
    <line x1="78" y1="200" x2="120" y2="240" stroke="#dc2626" stroke-width="3" marker-end="url(#g1)"/>
    <line x1="148" y1="160" x2="190" y2="200" stroke="#e5e7eb" stroke-width="2" marker-end="url(#gg)"/>
    <line x1="148" y1="240" x2="190" y2="200" stroke="#e5e7eb" stroke-width="2" marker-end="url(#gg)"/>
    <circle cx="70" cy="200" r="13" fill="#3b82f6"/><text x="70" y="205" text-anchor="middle" class="nd">0</text>
    <circle cx="135" cy="155" r="11" fill="#e5e7eb"/><circle cx="135" cy="245" r="11" fill="#e5e7eb"/>
    <circle cx="200" cy="200" r="13" fill="#10b981"/><text x="200" y="205" text-anchor="middle" class="nd">t</text>
  </g>
  <text x="154" y="296" text-anchor="middle" class="res" fill="#b91c1c">can't cross → ≈ chance</text>

  <!-- walkraw -->
  <rect x="290" y="64" width="240" height="250" rx="10" fill="#fffbeb" stroke="#fde68a"/>
  <text x="410" y="92" text-anchor="middle" class="lbl" fill="#b45309">Walk operator</text>
  <text x="410" y="110" text-anchor="middle" class="s">multi-hop · fixed weights</text>
  <g>
    <line x1="334" y1="200" x2="376" y2="160" stroke="#f59e0b" stroke-width="3" marker-end="url(#g2)"/>
    <line x1="334" y1="200" x2="376" y2="240" stroke="#f59e0b" stroke-width="3" marker-end="url(#g2)"/>
    <line x1="404" y1="160" x2="446" y2="200" stroke="#f59e0b" stroke-width="3" marker-end="url(#g2)"/>
    <line x1="404" y1="240" x2="446" y2="200" stroke="#f59e0b" stroke-width="3" marker-end="url(#g2)"/>
    <circle cx="326" cy="200" r="13" fill="#3b82f6"/><text x="326" y="205" text-anchor="middle" class="nd">0</text>
    <circle cx="391" cy="155" r="11" fill="#e5e7eb"/><circle cx="391" cy="245" r="11" fill="#e5e7eb"/>
    <circle cx="456" cy="200" r="13" fill="#10b981"/><text x="456" y="205" text-anchor="middle" class="nd">t</text>
  </g>
  <text x="410" y="296" text-anchor="middle" class="res" fill="#b45309">reaches, can't select → partial</text>

  <!-- walk attention -->
  <rect x="546" y="64" width="240" height="250" rx="10" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="666" y="92" text-anchor="middle" class="lbl" fill="#047857">Walk Attention</text>
  <text x="666" y="110" text-anchor="middle" class="s">multi-hop · learned</text>
  <g>
    <line x1="590" y1="200" x2="632" y2="160" stroke="#10b981" stroke-width="1.4" marker-end="url(#g3)"/>
    <line x1="590" y1="200" x2="632" y2="240" stroke="#10b981" stroke-width="5" marker-end="url(#g3)"/>
    <line x1="660" y1="160" x2="702" y2="200" stroke="#10b981" stroke-width="1.4" marker-end="url(#g3)"/>
    <line x1="660" y1="240" x2="702" y2="200" stroke="#10b981" stroke-width="5" marker-end="url(#g3)"/>
    <circle cx="582" cy="200" r="13" fill="#3b82f6"/><text x="582" y="205" text-anchor="middle" class="nd">0</text>
    <circle cx="647" cy="155" r="11" fill="#e5e7eb"/><circle cx="647" cy="245" r="11" fill="#e5e7eb"/>
    <circle cx="712" cy="200" r="13" fill="#10b981"/><text x="712" y="205" text-anchor="middle" class="nd">t</text>
  </g>
  <text x="666" y="296" text-anchor="middle" class="res" fill="#047857">focuses → solves it (1.000)</text>

  <!-- bottom: the two axes -->
  <rect x="34" y="332" width="752" height="80" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="52" y="360" class="lbl">Two axes decide everything:</text>
  <text x="52" y="386" class="s"><tspan font-weight="700">support</tspan> (1-hop vs multi-hop) lets you <tspan font-weight="700">reach</tspan>;  <tspan font-weight="700">learned weights</tspan> let you <tspan font-weight="700">select</tspan>.</text>
  <text x="52" y="406" class="s" fill="#047857" font-weight="600">Walk Attention is the only one with both — multi-hop reach AND learned, selective weights.</text>
</svg>
