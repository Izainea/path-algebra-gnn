<svg xmlns="http://www.w3.org/2000/svg" width="820" height="420" viewBox="0 0 820 420" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <style>
      .t{font-size:21px;font-weight:700;fill:#0f172a}
      .s{font-size:13px;fill:#475569}
      .lbl{font-size:14px;font-weight:600;fill:#1e293b}
      .math{font-family:'Cambria Math','Times New Roman',serif;font-style:italic}
      .deg{font-size:15px;font-weight:700;fill:#7c3aed}
      .gbox{fill:#faf5ff;stroke:#d8b4fe}
    </style>
  </defs>
  <rect width="820" height="420" fill="#ffffff"/>
  <text x="34" y="40" class="t">The path algebra is graded by length</text>
  <text x="34" y="66" class="lbl math">kQ = kQ₀ ⊕ kQ₁ ⊕ kQ₂ ⊕ kQ₃ ⊕ ⋯</text>

  <!-- the graded pieces as stacked boxes with basis paths -->
  <g>
    <rect x="40" y="92" width="740" height="58" rx="8" class="gbox"/>
    <text x="56" y="118" class="deg math">kQ₀</text>
    <text x="56" y="138" class="s">length 0</text>
    <text x="150" y="126" class="s math">basis: e₁, e₂, e₃, e₄  (the trivial paths / idempotents)</text>

    <rect x="40" y="158" width="740" height="58" rx="8" class="gbox"/>
    <text x="56" y="184" class="deg math">kQ₁</text>
    <text x="56" y="204" class="s">length 1</text>
    <text x="150" y="192" class="s math">basis: the arrows  α₁, α₂, β₁, β₂</text>

    <rect x="40" y="224" width="740" height="58" rx="8" class="gbox"/>
    <text x="56" y="250" class="deg math">kQ₂</text>
    <text x="56" y="270" class="s">length 2</text>
    <text x="150" y="258" class="s math">basis: the length-2 paths  β₁α₁, β₂α₂  (here, 2 of them)</text>
  </g>

  <!-- multiplication rule -->
  <rect x="40" y="298" width="740" height="98" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="56" y="326" class="lbl">Multiplication = concatenation, and it adds the degrees:</text>
  <text x="56" y="358" class="math" font-size="16" fill="#2563eb" font-weight="700">β₁ · α₁ = β₁α₁     (kQ₁ · kQ₁ ⊆ kQ₂)</text>
  <text x="56" y="384" class="s">two arrows compose head-to-tail into a length-2 path. In general  kQ_g · kQ_h ⊆ kQ_(g+h).</text>
</svg>
