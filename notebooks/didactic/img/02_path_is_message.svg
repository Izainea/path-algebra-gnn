<svg xmlns="http://www.w3.org/2000/svg" width="760" height="400" viewBox="0 0 760 400" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6366f1"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
    <style>
      .t{font-size:20px;font-weight:700;fill:#0f172a}
      .s{font-size:13px;fill:#475569}
      .n{font-size:12px;font-weight:700;fill:#fff}
      .p{font-size:12.5px;font-weight:600;fill:#4338ca}
      .big{font-size:15px;font-weight:700;fill:#3730a3}
    </style>
  </defs>
  <rect width="760" height="400" fill="#ffffff"/>
  <text x="30" y="34" class="t">Each path is one message — and they pile up</text>
  <text x="30" y="56" class="s">Cada camino es un mensaje — y se acumulan</text>

  <!-- the diamond x2 stacked into a deeper graph: i -> {a,b} -> {c,d} -> j -->
  <g stroke="#94a3b8" stroke-width="1.4" fill="none" marker-end="url(#g)">
    <line x1="80" y1="200" x2="210" y2="140"/><line x1="80" y1="200" x2="210" y2="260"/>
    <line x1="240" y1="140" x2="370" y2="140"/><line x1="240" y1="140" x2="370" y2="260"/>
    <line x1="240" y1="260" x2="370" y2="140"/><line x1="240" y1="260" x2="370" y2="260"/>
    <line x1="400" y1="140" x2="520" y2="200"/><line x1="400" y1="260" x2="520" y2="200"/>
  </g>
  <!-- nodes -->
  <circle cx="70" cy="200" r="22" fill="#6366f1"/><text x="70" y="205" text-anchor="middle" class="n">i</text>
  <circle cx="225" cy="140" r="18" fill="#a5b4fc"/><circle cx="225" cy="260" r="18" fill="#a5b4fc"/>
  <circle cx="385" cy="140" r="18" fill="#a5b4fc"/><circle cx="385" cy="260" r="18" fill="#a5b4fc"/>
  <circle cx="530" cy="200" r="22" fill="#34d399"/><text x="530" y="205" text-anchor="middle" class="n">j</text>

  <text x="70" y="245" text-anchor="middle" class="s">info here</text>
  <text x="530" y="245" text-anchor="middle" class="s">arrives here</text>

  <!-- count of distinct paths i->j of length 3 -->
  <rect x="585" y="120" width="160" height="170" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="665" y="146" text-anchor="middle" class="big">4 paths</text>
  <text x="665" y="164" text-anchor="middle" class="s">i → j, length 3</text>
  <text x="600" y="192" class="p">= 4 copies of i's</text>
  <text x="600" y="210" class="p">message land at j</text>
  <text x="600" y="238" class="s">n₃(i,j) = (A³)ᵢⱼ = 4</text>
  <text x="600" y="262" class="s">all into ONE</text>
  <text x="600" y="278" class="s">vector at j</text>

  <!-- bottom takeaway -->
  <rect x="30" y="320" width="715" height="62" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="45" y="344" class="big">The path count n_g(i,j) = how many messages from i pile up at j after g hops.</text>
  <text x="45" y="366" class="s">El conteo de caminos n_g(i,j) = cuántos mensajes de i se acumulan en j tras g saltos.  →  more distance = exponentially more messages.</text>
</svg>
