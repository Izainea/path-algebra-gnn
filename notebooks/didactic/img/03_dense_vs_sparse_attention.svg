<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <style>
      .t{font-size:20px;font-weight:700;fill:#0f172a}
      .s{font-size:13px;fill:#475569}
      .h{font-size:15px;font-weight:700;fill:#1e293b}
      .cap{font-size:12px;fill:#475569}
      .tag{font-size:12.5px;font-weight:700}
    </style>
  </defs>
  <rect width="760" height="420" fill="#ffffff"/>
  <text x="30" y="34" class="t">The path algebra makes attention sparse and multi-hop</text>
  <text x="30" y="56" class="s">El álgebra de caminos hace la atención dispersa y multi-salto</text>

  <!-- LEFT: dense all-pairs attention -->
  <text x="60" y="98" class="h">Transformer attention</text>
  <text x="60" y="116" class="cap">all-pairs / todos-contra-todos</text>
  <!-- 6x6 grid fully shaded -->
  <g>
    <rect x="60" y="130" width="180" height="180" fill="#fee2e2" stroke="#fca5a5"/>
    <g stroke="#fca5a5" stroke-width="1">
      <line x1="60" y1="160" x2="240" y2="160"/><line x1="60" y1="190" x2="240" y2="190"/><line x1="60" y1="220" x2="240" y2="220"/><line x1="60" y1="250" x2="240" y2="250"/><line x1="60" y1="280" x2="240" y2="280"/>
      <line x1="90" y1="130" x2="90" y2="310"/><line x1="120" y1="130" x2="120" y2="310"/><line x1="150" y1="130" x2="150" y2="310"/><line x1="180" y1="130" x2="180" y2="310"/><line x1="210" y1="130" x2="210" y2="310"/>
    </g>
    <!-- fill every cell -->
    <g fill="#ef4444" opacity="0.55">
      <rect x="61" y="131" width="28" height="28"/><rect x="91" y="131" width="28" height="28"/><rect x="121" y="131" width="28" height="28"/><rect x="151" y="131" width="28" height="28"/><rect x="181" y="131" width="28" height="28"/><rect x="211" y="131" width="28" height="28"/>
      <rect x="61" y="161" width="28" height="28"/><rect x="91" y="161" width="28" height="28"/><rect x="121" y="161" width="28" height="28"/><rect x="151" y="161" width="28" height="28"/><rect x="181" y="161" width="28" height="28"/><rect x="211" y="161" width="28" height="28"/>
      <rect x="61" y="191" width="28" height="28"/><rect x="91" y="191" width="28" height="28"/><rect x="121" y="191" width="28" height="28"/><rect x="151" y="191" width="28" height="28"/><rect x="181" y="191" width="28" height="28"/><rect x="211" y="191" width="28" height="28"/>
      <rect x="61" y="221" width="28" height="28"/><rect x="91" y="221" width="28" height="28"/><rect x="121" y="221" width="28" height="28"/><rect x="151" y="221" width="28" height="28"/><rect x="181" y="221" width="28" height="28"/><rect x="211" y="221" width="28" height="28"/>
      <rect x="61" y="251" width="28" height="28"/><rect x="91" y="251" width="28" height="28"/><rect x="121" y="251" width="28" height="28"/><rect x="151" y="251" width="28" height="28"/><rect x="181" y="251" width="28" height="28"/><rect x="211" y="251" width="28" height="28"/>
      <rect x="61" y="281" width="28" height="28"/><rect x="91" y="281" width="28" height="28"/><rect x="121" y="281" width="28" height="28"/><rect x="151" y="281" width="28" height="28"/><rect x="181" y="281" width="28" height="28"/><rect x="211" y="281" width="28" height="28"/>
    </g>
  </g>
  <text x="150" y="334" text-anchor="middle" class="tag" fill="#b91c1c">N² entries (100%)</text>
  <text x="150" y="352" text-anchor="middle" class="cap">expensive; no structure</text>

  <!-- RIGHT: sparse walk-masked attention -->
  <text x="430" y="98" class="h">WalkAttention</text>
  <text x="430" y="116" class="cap">only walk-reachable pairs / solo pares alcanzables</text>
  <g>
    <rect x="430" y="130" width="180" height="180" fill="#ecfdf5" stroke="#6ee7b7"/>
    <g stroke="#6ee7b7" stroke-width="1">
      <line x1="430" y1="160" x2="610" y2="160"/><line x1="430" y1="190" x2="610" y2="190"/><line x1="430" y1="220" x2="610" y2="220"/><line x1="430" y1="250" x2="610" y2="250"/><line x1="430" y1="280" x2="610" y2="280"/>
      <line x1="460" y1="130" x2="460" y2="310"/><line x1="490" y1="130" x2="490" y2="310"/><line x1="520" y1="130" x2="520" y2="310"/><line x1="550" y1="130" x2="550" y2="310"/><line x1="580" y1="130" x2="580" y2="310"/>
    </g>
    <!-- only a few cells filled (the reachable ones) -->
    <g fill="#10b981" opacity="0.8">
      <rect x="461" y="131" width="28" height="28"/>
      <rect x="521" y="161" width="28" height="28"/>
      <rect x="431" y="191" width="28" height="28"/>
      <rect x="581" y="221" width="28" height="28"/>
      <rect x="491" y="251" width="28" height="28"/>
      <rect x="551" y="281" width="28" height="28"/>
      <rect x="431" y="281" width="28" height="28"/>
    </g>
  </g>
  <text x="520" y="334" text-anchor="middle" class="tag" fill="#047857">~2% of entries</text>
  <text x="520" y="352" text-anchor="middle" class="cap">cheap; algebra picks the pairs</text>

  <!-- center arrow + takeaway -->
  <text x="335" y="225" text-anchor="middle" font-size="26" fill="#94a3b8">→</text>
  <rect x="30" y="372" width="700" height="40" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="45" y="397" class="s">Same idea (query·key over node pairs), but the mask Aᵍ&gt;0 keeps only the pairs connected by length-g walks — global reach, tiny cost.</text>
</svg>
